name: Deploy Cloud Functions

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: bulkemail-crm

      - name: Debug repo layout
        run: |
          echo "Workspace files:" && ls -la
          echo "Repo root listing:" && ls -la $GITHUB_WORKSPACE || true
          echo "Checking for functions dir:" && if [ -d "$GITHUB_WORKSPACE/functions" ]; then echo "functions exists"; ls -la $GITHUB_WORKSPACE/functions; else echo "functions missing"; fi

      - name: Build functions
        if: ${{ always() }}
        run: |
          # ignore submodule issues and build if functions dir exists
          if [ -d "$GITHUB_WORKSPACE/functions" ]; then
            cd "$GITHUB_WORKSPACE/functions"
            npm ci
            npm run build
          else
            echo "No functions directory found in workspace; skipping build"
            exit 1
          fi

      - name: Deploy function
        run: |
          gcloud functions deploy api \
            --region=us-central1 \
            --runtime=nodejs20 \
            --trigger-http \
            --entry-point=api \
            --allow-unauthenticated
